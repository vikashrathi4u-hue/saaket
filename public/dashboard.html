function sortTable(column) {

    if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
        sortColumn = column;
        sortDirection = 'asc';
    }

    reportData.sort((a,b)=>{

        let x = a[column];
        let y = b[column];

        if(column === 'totalSale'){
            x = Number(x);
            y = Number(y);
        } else {
            x = String(x).toLowerCase();
            y = String(y).toLowerCase();
        }

        if(sortDirection === 'asc'){
            return x > y ? 1 : -1;
        } else {
            return x < y ? 1 : -1;
        }
    });

    renderTablePage(1);
}

function getArrow(column){

    if(sortColumn !== column)
        return '↕';

    return sortDirection === 'asc'
        ? '▲'
        : '▼';
}

// Clean up messy item codes automatically using string patterns
function cleanItemCodeHeuristics(rawCode) {
    if (!rawCode) return "";
    let clean = String(rawCode).toUpperCase().trim();
    // Strip common store spreadsheet prefixes
    clean = clean.replace(/^(KF#|KF-|KF|RRC-|VC_|PLAZO SET|SET\s*\d+)/g, "");
    // Remove symbols, hyphens, hashes, and blank spaces
    clean = clean.replace(/[#\-_/\s]/g, "");
    return clean;
}

// Map store variations to base uniform colors
function parseStandardizedColorField(rawColor) {
    if (!rawColor) return "ASSORTED";
    let text = String(rawColor).toUpperCase().trim();
    if (text.includes("YELLOW") || text === "LEMON" || text === "L.YELLOW") return "YELLOW";
    if (text.includes("GREEN") || text === "RAMA" || text === "L.GREEN" || text === "MINT GREEN") return "GREEN";
    if (text.includes("BLUE") || text === "PEACOCK BLUE" || text === "NAVY") return "BLUE";
    if (text.includes("PINK") || text === "DEEP PINK") return "PINK";
    return text; // Fallback string literal retention
}

            // Compile matrix objects beginning immediately below targeted header indexes
            // Compile matrix objects beginning immediately below targeted header indexes
for (let i = headerIndex + 1; i < rawRows.length; i++) {
    const currentRow = rawRows[i];
    
    // Check if DESCRIPTION holds our design code, otherwise fall back to itemIdx
    const descIdx = headers.findIndex(h => h === "DESCRIPTION");
    const rawCodeStr = descIdx !== -1 && currentRow[descIdx] ? currentRow[descIdx] : currentRow[itemIdx];
    
    if (!rawCodeStr || String(rawCodeStr).trim() === "" || String(rawCodeStr).toUpperCase().includes("TOTAL")) continue;

    const cleanItemCode = cleanItemCodeHeuristics(rawCodeStr);
                const rawColorStr = colorIdx !== -1 ? currentRow[colorIdx] : "ASSORTED";
                const standardColor = parseStandardizedColorField(rawColorStr);

                // Build sub-object map properties matching sizes
                const sizesObj = {};
                sizeMapLookup.forEach(s => {
                    const value = parseInt(currentRow[s.columnIndex], 10) || 0;
                    if (value > 0) {
                        sizesObj[s.sizeName] = value;
                    }
                });

                outputItemsPayload.push({
                    store_code: storeCode,
                    raw_item_code: String(rawCodeStr).trim(),
                    clean_item_code: cleanItemCode,
                    raw_color: String(rawColorStr).trim(),
                    color: standardColor,
                    sizes: sizesObj
                });
            }

            logs.innerText = `Compiled ${outputItemsPayload.length} rows locally. Purging obsolete cache snapshots and executing server push...`;

            // Stream parsed structural block array directly to Cloudflare edge handler
            const response = await fetch("/upload_closing_stock", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    category: category,
                    brand: brand,
                    itemsData: outputItemsPayload
                })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error || "Internal Server ingestion pipeline exception code error.");

            logs.innerHTML = `<span style="color:green; font-weight:bold;">✔ Snapshot Updated! Processed ${result.rowsProcessed} codes across truth models.</span>`;
            alert("Closing stock snapshot saved perfectly. Old overlapping values deleted.");
            fetchActiveMatrixReportFromServer();

        } catch (err) {
            logs.innerHTML = `<span style="color:red; font-weight:bold;">❌ Parsing Error: ${err.message}</span>`;
            alert("Processing error: " + err.message);
        }
    };

    reader.readAsArrayBuffer(file);
}

// Build standard HTML document node rows utilizing dynamic layout columns grid models
function renderCompiledMatrixTableEngine(rows) {
    const anchor = document.getElementById("matrixTableAnchor");
    if (!rows || rows.length === 0) {
        anchor.innerText = "No active inventory records matching selected parameters found in current database tracks.";
        return;
    }

    const sizeCount = currentServerMatrixSizes.length;
    
    // Construct double layer table row structural cell allocations headers
    let html = `
        <style>
            .matrix-tbl { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; margin-top: 10px; }
            .matrix-tbl th, .matrix-tbl td { border: 1px solid #ddd; padding: 8px; }
            .matrix-tbl thead th { background: #2c3e50; color: white; position: sticky; top: 0; }
            .hdr-rrc { background: #2980b9 !important; color: white; }
            .hdr-vc { background: #8e44ad !important; color: white; }
            .hdr-rrb { background: #27ae60 !important; color: white; }
            .sub-hdr { background: #f8f9fa !important; color: #333; font-weight: bold; font-size: 11px; }
            .tot-cell { background: #f1f2f6; font-weight: bold; color: #2c3e50; }
            .row-highlight:hover { background: #f1f2f6; }
        </style>
        <table class="matrix-tbl">
            <thead>
                <tr>
                    <th rowspan="2" style="background:#1a252f;">Category</th>
                    <th rowspan="2" style="background:#1a252f;">Brand</th>
                    <th rowspan="2" style="background:#1a252f;">Item Code</th>
                    <th rowspan="2" style="background:#1a252f;">Color</th>
                    <th colspan="${sizeCount + 1}" class="hdr-rrc">RRC</th>
                    <th colspan="${sizeCount + 1}" class="hdr-vc">VC</th>
                    <th colspan="${sizeCount + 1}" class="hdr-rrb">RRB</th>
                </tr>
                <tr>
    `;

    // Render Sub-Header Sizing Strings Loops for each Store Grouping
    for (let storeLoop = 0; storeLoop < 3; storeLoop++) {
        currentServerMatrixSizes.forEach(s => {
            html += `<th class="sub-hdr">${s}</th>`;
        });
        html += `<th class="sub-hdr" style="background:#e7e7e7!important; border-right:2px solid #2c3e50;">TOTAL</th>`;
    }

    html += `</tr></thead><tbody>`;

    // Inject row cells calculations
    rows.forEach(r => {
        html += `
            <tr class="row-highlight">
                <td style="font-weight:bold; text-align:left;">${r.category}</td>
                <td style="color:#666; text-align:left;">${r.brand}</td>
                <td style="font-weight:bold; color:#e67e22;">${r.clean_item_code}</td>
                <td><span style="background:#f1f2f6; padding:2px 6px; border-radius:3px; font-size:11px; font-weight:bold;">${r.color}</span></td>
        `;

        // Output RRC Store Sizes Columns Data Loop
        currentServerMatrixSizes.forEach(s => {
            const qty = r.rrc_sizes[s] || 0;
            html += `<td style="${qty === 0 ? 'color:#ccc;' : 'font-weight:bold;'}">${qty}</td>`;
        });
        html += `<td class="tot-cell" style="border-right:2px solid #2c3e50;">${r.rrc_total_qty}</td>`;

        // Output VC Store Sizes Columns Data Loop
        currentServerMatrixSizes.forEach(s => {
            const qty = r.vc_sizes[s] || 0;
            html += `<td style="${qty === 0 ? 'color:#ccc;' : 'font-weight:bold;'}">${qty}</td>`;
        });
        html += `<td class="tot-cell" style="border-right:2px solid #2c3e50;">${r.vc_total_qty}</td>`;

        // Output RRB Store Sizes Columns Data Loop
        currentServerMatrixSizes.forEach(s => {
            const qty = r.rrb_sizes[s] || 0;
            html += `<td style="${qty === 0 ? 'color:#ccc;' : 'font-weight:bold;'}">${qty}</td>`;
        });
        html += `<td class="tot-cell">${r.rrb_total_qty}</td>`;

        html += `</tr>`;
    });

    html += `</tbody></table>`;
    anchor.innerHTML = html;
}

// Format UTC database records into clean, local display lines
function formatDisplayDateTime(dateStr) {
    if (!dateStr || dateStr === "Never") return "No Active Data";
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-IN') + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

// Flatten multi-store nested sizes structures into nested excel row structures side by side
function downloadMatrixExcel() {
    if (!currentServerMatrixData || currentServerMatrixData.length === 0) {
        alert("No active rows found to generate excel sheets.");
        return;
    }

    const category = document.getElementById("matrixCategory").value;
    const brand = document.getElementById("matrixBrand").value;

    // Create workbook grid matrix
    const wb = XLSX.utils.book_new();
    const sheetData = [];

    // Header Layer 1 (Store Groupings)
    const topHeader = ["Category", "Brand", "Item Code", "Color"];
    
    // Add columns padding blocks to match structural nested layouts in output cells
    // Size columns count + 1 total column for each store
    const sizeSpan = currentServerMatrixSizes.length + 1;
    
    topHeader.push("RRC");
    for(let i=1; i < sizeSpan; i++) topHeader.push("");
    topHeader.push("VC");
    for(let i=1; i < sizeSpan; i++) topHeader.push("");
    topHeader.push("RRB");

    sheetData.push(topHeader);

    // Header Layer 2 (Sizing Sub-headers)
    const subHeader = ["", "", "", ""];
    for (let loop = 0; loop < 3; loop++) {
        currentServerMatrixSizes.forEach(s => subHeader.push(s));
        subHeader.push("TOTAL");
    }
    sheetData.push(subHeader);

    // Build row item matrices cells array data maps
    currentServerMatrixData.forEach(r => {
        const rowLine = [r.category, r.brand, r.clean_item_code, r.color];

        // RRC Quantities
        currentServerMatrixSizes.forEach(s => rowLine.push(r.rrc_sizes[s] || 0));
        rowLine.push(r.rrc_total_qty);

        // VC Quantities
        currentServerMatrixSizes.forEach(s => rowLine.push(r.vc_sizes[s] || 0));
        rowLine.push(r.vc_total_qty);

        // RRB Quantities
        currentServerMatrixSizes.forEach(s => rowLine.push(r.rrb_sizes[s] || 0));
        rowLine.push(r.rrb_total_qty);

        sheetData.push(rowLine);
    });

    // Convert data to standard matrix excel worksheet sheet arrays
    const ws = XLSX.utils.aoa_to_sheet(sheetData);

    // Apply native cell merges layout configurations to merge store title grids
    ws["!merges"] = [
        { s: { r: 0, c: 0 }, e: { r: 1, c: 0 } }, // Merge Category vertical
        { s: { r: 0, c: 1 }, e: { r: 1, c: 1 } }, // Merge Brand vertical
        { s: { r: 0, c: 2 }, e: { r: 1, c: 2 } }, // Merge Item vertical
        { s: { r: 0, c: 3 }, e: { r: 1, c: 3 } }, // Merge Color vertical
        // Merge Store horizontal blocks across sub-sizes span arrays
        { s: { r: 0, c: 4 }, e: { r: 0, c: 4 + sizeSpan - 1 } }, // RRC Block
        { s: { r: 0, c: 4 + sizeSpan }, e: { r: 0, c: 4 + (sizeSpan * 2) - 1 } }, // VC Block
        { s: { r: 0, c: 4 + (sizeSpan * 2) }, e: { r: 0, c: 4 + (sizeSpan * 3) - 1 } } // RRB Block
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Inventory Matrix");
    
    // Save target file attachment naming line matches configuration
    const filename = `${category.replace(/\s+/g, '_')}_${brand.replace(/\s+/g, '_')}_Stock_Matrix.xlsx`;
    XLSX.writeFile(wb, filename);
}
